<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Конфетти и плавающие картинки</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stage">
    <canvas id="confetti"></canvas>

    <div class="float-layer"></div>

    <div class="panel">
      <h1>Падающее конфетти + плавающие картинки</h1>
      <p>Нажмите кнопки и смотрите на эффект.</p>

      <div class="controls">
        <button id="startBtn">Start Confetti</button>
        <button id="stopBtn" class="secondary">Stop</button>
        <button id="addImgBtn" class="secondary">Добавить картинку</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
